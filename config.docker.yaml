server:
  port: 8080
  jwt_secret: "change-me-in-production"
  jwt_expire_hours: 24

db:
  host: "host-gateway"  # 宿主机 PostgreSQL 地址（docker-compose extra_hosts 将 host-gateway 映射到宿主机 IP，兼容 Linux/Mac/Windows）
  port: 5432
  user: postgres
  password: "change-me"
  dbname: fanapi
  sslmode: disable
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_idle_sec: 300

redis:
  addr: "host-gateway:6379"  # 宿主机 Redis 地址
  password: ""
  db: 0

nats:
  url: "nats://host-gateway:4222"  # 宿主机 NATS 地址

smtp:
  host: smtp.example.com
  port: 465
  user: no-reply@example.com
  password: ""
  from: "FanAPI <no-reply@example.com>"
